server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # Security Headers
    # ---------------------------------------------------------------------------

    # Prevent embedding in iframes (clickjacking protection)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Control how much referrer info is sent
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limit browser feature access
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # HTTP Strict Transport Security (only meaningful when served over HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy
    # - default-src 'self': hanya izinkan resource dari domain sendiri
    # - script-src: izinkan self + Google Tag Manager
    # - connect-src: izinkan fetch ke backend production & localhost dev + Firebase APIs
    # - font-src: izinkan Google Fonts
    # - img-src: izinkan self, data URIs, dan CDN crest tim
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https: blob:;
        connect-src 'self'
            http://localhost:8000
            https://sports.fuenzer.web.id
            https://*.firebaseio.com
            https://firestore.googleapis.com
            https://identitytoolkit.googleapis.com
            https://securetoken.googleapis.com
            https://www.google-analytics.com
            https://openrouter.ai;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ---------------------------------------------------------------------------
    # SPA Routing
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve static assets efficiently
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
        # Re-add security headers for static assets (add_header in nested location overrides parent)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Deny access to hidden files (e.g., .env, .git)
    location ~ /\. {
        deny all;
    }
}
