name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          
          # Create a separate folder for clean git initialization
          mkdir -p ../temp_deploy
          cp -r backend/* ../temp_deploy/
          cd ../temp_deploy
          
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy backend to Hugging Face Spaces"
          
          # Force push to main branch in Hugging Face Space
          git push -f https://Yogs4R:$HF_TOKEN@huggingface.co/spaces/Yogs4R/fuenzer-sports-backend main:main
